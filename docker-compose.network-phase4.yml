# Phase 4 — multi-server proof for osm.Network approximate routing.
#
# Containerized MongoDB (coordination) + N independent route-runner instances
# (the "servers") sharing ONE prebuilt network artifact via a mounted volume.
# Proves the two distributed claims from
# docs/architecture/approximate-freeway-routing.md:
#   1. lock-free task distribution — the RouteFanout foreach fans out into N
#      ApproxRoute tasks; the scaled runners race on the atomic Mongo claim, so
#      the work spreads across instances with no coordinator.
#   2. read-once-per-runner — every runner loads the SAME shared network artifact
#      from the volume once into memory; results are identical to a single host.
#
# Run (from the facetwork repo root):
#   AFL_DATA_DIR=/tmp/phase4-data \
#   docker compose -p phase4 -f docker-compose.network-phase4.yml up -d --build --scale route-runner=2
#   # seed happens per-container at start; then submit from the host venv:
#   AFL_MONGODB_URL=mongodb://localhost:27019 AFL_MONGODB_DATABASE=facetwork \
#     scripts/run-workflow --workflow osm.Network.workflows.RouteFanout \
#       --input '{"network_path":"/data/cache/osm/network/motorways@tol25-i","pairs":[...]}'
#
# AFL_DATA_DIR must contain the prebuilt artifact at
#   cache/osm/network/<name>/{nodes,edges}.geojson + graph.json  (+ .meta.json)

services:
  mongodb:
    image: mongo:7
    command: ["--bind_ip_all", "--port", "27017"]
    ports:
      - "27019:27017"          # host:container — submit/verify from the host venv
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 12

  # Scalable osm.Network runner. Reuses the proven per-example image: it
  # pip-installs the bind-mounted fwh_osm, seeds its handlers + FFL into Mongo
  # (idempotent), then runs a RegistryRunner. `--scale route-runner=N` gives N
  # independent instances coordinating only through Mongo + the shared volume.
  route-runner:
    build:
      context: .
      dockerfile: docker/Dockerfile.example-runner
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      AFL_MONGODB_URL: mongodb://mongodb:27017
      AFL_MONGODB_DATABASE: facetwork
      AFL_EXAMPLE_NAME: osm-geocoder
      AFL_EXAMPLE_REPO: fwh_osm
      AFL_DATA_ROOT: /data            # osm cache root -> /data/cache/osm/...
      AFL_OUTPUT_BASE: /data/output   # ApproxRoute writes route GeoJSON here
      AFL_POLL_INTERVAL_MS: "500"
    volumes:
      - ${FWH_HANDLERS_ROOT:-/Users/ralph_lemke/fw_handlers}/fwh_osm:/handlers/fwh_osm
      - ${AFL_DATA_DIR:-/tmp/phase4-data}:/data
    restart: unless-stopped
