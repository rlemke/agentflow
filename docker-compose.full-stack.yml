# Facetwork full-stack development environment.
#
# One MongoDB + one PostGIS + one Jenkins + the Facetwork dashboard
# and main runner + a dedicated registry-mode runner per fwh_* example
# (anthropic, osm-geocoder, osm-lz, noaa-weather, jenkins-pipeline,
# census-us, genomics, sensor-monitoring).
#
# Each example runner stays small: it bind-mounts ~/fw_handlers/<repo>
# and pip-installs it editable at startup, so handler edits land in the
# running container without a rebuild.
#
# Start everything:
#   docker compose -f docker-compose.full-stack.yml up -d
#
# Just infra + dashboard:
#   docker compose -f docker-compose.full-stack.yml up -d \
#       mongodb postgis dashboard
#
# Watch a single example runner:
#   docker compose -f docker-compose.full-stack.yml logs -f runner-anthropic
#
# Tear down (keeps data volumes):
#   docker compose -f docker-compose.full-stack.yml down
#
# Tear down INCLUDING data:
#   docker compose -f docker-compose.full-stack.yml down -v
#
# External disk: /Volumes/afl_data is mounted into the dashboard and
# every runner so all examples share the same cache + output paths.
# Override the host path with AFL_DATA_DIR in .env or your shell.

services:

  # =====================================================================
  # Infrastructure
  # =====================================================================

  mongodb:
    image: mongo:7
    container_name: facetwork-mongodb
    command: ["--bind_ip_all", "--port", "27017"]
    ports:
      - "${AFL_MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  postgis:
    image: postgis/postgis:16-3.4
    container_name: facetwork-postgis
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-afl_gis}
      POSTGRES_USER: ${POSTGRES_USER:-afl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-afl}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./docker/postgis-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-afl} -d ${POSTGRES_DB:-afl_gis}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  jenkins:
    image: jenkins/jenkins:lts
    container_name: facetwork-jenkins
    ports:
      - "${JENKINS_UI_PORT:-9090}:8080"
      - "${JENKINS_AGENT_PORT:-50000}:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/login || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  # =====================================================================
  # Facetwork dashboard + main runner
  # =====================================================================

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: facetwork-dashboard
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      AFL_MONGODB_URL: mongodb://mongodb:27017
      AFL_MONGODB_DATABASE: afl
      AFL_EXAMPLES_DATABASE: ${AFL_EXAMPLES_DATABASE:-afl_examples}
      AFL_LOCAL_OUTPUT_DIR: ${AFL_DATA_DIR:-/Volumes/afl_data}/output
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    volumes:
      - ${AFL_DATA_DIR:-/Volumes/afl_data}:/Volumes/afl_data:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # The "main" runner — runs against the built-in examples bundled
  # inside this repo (hello-agent, aws-lambda, devops-deploy, etc.).
  # The standalone fwh_* examples each get their own dedicated runner
  # below.
  runner:
    build:
      context: .
      dockerfile: docker/Dockerfile.runner
    container_name: facetwork-runner
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      AFL_MONGODB_URL: mongodb://mongodb:27017
      AFL_MONGODB_DATABASE: afl
      AFL_MAX_CONCURRENT: ${AFL_MAX_CONCURRENT:-4}
      AFL_POLL_INTERVAL_MS: ${AFL_POLL_INTERVAL_MS:-1000}
      AFL_LOCAL_OUTPUT_DIR: ${AFL_DATA_DIR:-/Volumes/afl_data}/output
      PYTHONPATH: /app
    volumes:
      - ${AFL_DATA_DIR:-/Volumes/afl_data}:/Volumes/afl_data
      - ./examples:/app/examples:ro
    restart: unless-stopped

  # =====================================================================
  # Per-example runners — one container per fwh_* repo.
  # Each bind-mounts ~/fw_handlers/<repo> and pip-installs at startup.
  # =====================================================================

  runner-anthropic:
    build:
      context: .
      dockerfile: docker/Dockerfile.example-runner
    container_name: facetwork-runner-anthropic
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      AFL_MONGODB_URL: mongodb://mongodb:27017
      AFL_MONGODB_DATABASE: afl
      AFL_EXAMPLE_NAME: anthropic
      AFL_EXAMPLE_REPO: fwh_anthropic
      AFL_EXAMPLE_EXTRAS: ${ANTHROPIC_EXTRAS:-agent_sdk,mcp}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AFL_LOCAL_OUTPUT_DIR: ${AFL_DATA_DIR:-/Volumes/afl_data}/output
    volumes:
      - ${FWH_HANDLERS_ROOT:-$HOME/fw_handlers}/fwh_anthropic:/handlers/fwh_anthropic
      - ${AFL_DATA_DIR:-/Volumes/afl_data}:/Volumes/afl_data
    restart: unless-stopped

  runner-osm-geocoder:
    build:
      context: .
      dockerfile: docker/Dockerfile.example-runner
    container_name: facetwork-runner-osm-geocoder
    depends_on:
      mongodb:
        condition: service_healthy
      postgis:
        condition: service_healthy
    environment:
      AFL_MONGODB_URL: mongodb://mongodb:27017
      AFL_MONGODB_DATABASE: afl
      AFL_EXAMPLE_NAME: osm-geocoder
      AFL_EXAMPLE_REPO: fwh_osm
      AFL_POSTGIS_URL: postgresql://${POSTGRES_USER:-afl}:${POSTGRES_PASSWORD:-afl}@postgis:5432/${POSTGRES_DB:-afl_gis}
      AFL_GEOFABRIK_MIRROR: /Volumes/afl_data/osm
      AFL_OSM_OUTPUT_BASE: /Volumes/afl_data/osm-output
      AFL_LOCAL_OUTPUT_DIR: ${AFL_DATA_DIR:-/Volumes/afl_data}/output
    volumes:
      - ${FWH_HANDLERS_ROOT:-$HOME/fw_handlers}/fwh_osm:/handlers/fwh_osm
      - ${AFL_DATA_DIR:-/Volumes/afl_data}:/Volumes/afl_data
    restart: unless-stopped

  runner-osm-lz:
    build:
      context: .
      dockerfile: docker/Dockerfile.example-runner
    container_name: facetwork-runner-osm-lz
    depends_on:
      mongodb:
        condition: service_healthy
      # osm-lz is a pure workflow catalog over fwh_osm — its facets
      # dispatch to handlers in the osm-geocoder runner.  Start that
      # one first so it has its handlers registered when we seed.
      runner-osm-geocoder:
        condition: service_started
    environment:
      AFL_MONGODB_URL: mongodb://mongodb:27017
      AFL_MONGODB_DATABASE: afl
      AFL_EXAMPLE_NAME: osm-lz
      AFL_EXAMPLE_REPO: fwh_osm_lz
      AFL_POSTGIS_URL: postgresql://${POSTGRES_USER:-afl}:${POSTGRES_PASSWORD:-afl}@postgis:5432/${POSTGRES_DB:-afl_gis}
      AFL_LOCAL_OUTPUT_DIR: ${AFL_DATA_DIR:-/Volumes/afl_data}/output
    volumes:
      - ${FWH_HANDLERS_ROOT:-$HOME/fw_handlers}/fwh_osm_lz:/handlers/fwh_osm_lz
      - ${FWH_HANDLERS_ROOT:-$HOME/fw_handlers}/fwh_osm:/handlers/fwh_osm:ro
      - ${AFL_DATA_DIR:-/Volumes/afl_data}:/Volumes/afl_data
    restart: unless-stopped

  runner-noaa-weather:
    build:
      context: .
      dockerfile: docker/Dockerfile.example-runner
    container_name: facetwork-runner-noaa-weather
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      AFL_MONGODB_URL: mongodb://mongodb:27017
      AFL_MONGODB_DATABASE: afl
      AFL_EXAMPLE_NAME: noaa-weather
      AFL_EXAMPLE_REPO: fwh_noaa_weather
      AFL_LOCAL_OUTPUT_DIR: ${AFL_DATA_DIR:-/Volumes/afl_data}/output
    volumes:
      - ${FWH_HANDLERS_ROOT:-$HOME/fw_handlers}/fwh_noaa_weather:/handlers/fwh_noaa_weather
      - ${AFL_DATA_DIR:-/Volumes/afl_data}:/Volumes/afl_data
    restart: unless-stopped

  runner-jenkins-example:
    build:
      context: .
      dockerfile: docker/Dockerfile.example-runner
    container_name: facetwork-runner-jenkins-example
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      AFL_MONGODB_URL: mongodb://mongodb:27017
      AFL_MONGODB_DATABASE: afl
      AFL_EXAMPLE_NAME: jenkins
      AFL_EXAMPLE_REPO: fwh_jenkins
      JENKINS_URL: http://jenkins:8080
      AFL_LOCAL_OUTPUT_DIR: ${AFL_DATA_DIR:-/Volumes/afl_data}/output
    volumes:
      - ${FWH_HANDLERS_ROOT:-$HOME/fw_handlers}/fwh_jenkins:/handlers/fwh_jenkins
      - ${AFL_DATA_DIR:-/Volumes/afl_data}:/Volumes/afl_data
    restart: unless-stopped

  runner-census-us:
    build:
      context: .
      dockerfile: docker/Dockerfile.example-runner
    container_name: facetwork-runner-census-us
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      AFL_MONGODB_URL: mongodb://mongodb:27017
      AFL_MONGODB_DATABASE: afl
      AFL_EXAMPLE_NAME: census-us
      AFL_EXAMPLE_REPO: fwh_census_us
      CENSUS_API_KEY: ${CENSUS_API_KEY:-}
      AFL_LOCAL_OUTPUT_DIR: ${AFL_DATA_DIR:-/Volumes/afl_data}/output
    volumes:
      - ${FWH_HANDLERS_ROOT:-$HOME/fw_handlers}/fwh_census_us:/handlers/fwh_census_us
      - ${AFL_DATA_DIR:-/Volumes/afl_data}:/Volumes/afl_data
    restart: unless-stopped

  runner-genomics:
    build:
      context: .
      dockerfile: docker/Dockerfile.example-runner
    container_name: facetwork-runner-genomics
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      AFL_MONGODB_URL: mongodb://mongodb:27017
      AFL_MONGODB_DATABASE: afl
      AFL_EXAMPLE_NAME: genomics
      AFL_EXAMPLE_REPO: fwh_genomics
      AFL_LOCAL_OUTPUT_DIR: ${AFL_DATA_DIR:-/Volumes/afl_data}/output
    volumes:
      - ${FWH_HANDLERS_ROOT:-$HOME/fw_handlers}/fwh_genomics:/handlers/fwh_genomics
      - ${AFL_DATA_DIR:-/Volumes/afl_data}:/Volumes/afl_data
    restart: unless-stopped

  runner-sensor-monitoring:
    build:
      context: .
      dockerfile: docker/Dockerfile.example-runner
    container_name: facetwork-runner-sensor-monitoring
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      AFL_MONGODB_URL: mongodb://mongodb:27017
      AFL_MONGODB_DATABASE: afl
      AFL_EXAMPLE_NAME: sensor-monitoring
      AFL_EXAMPLE_REPO: fwh_sensor_monitoring
      AFL_LOCAL_OUTPUT_DIR: ${AFL_DATA_DIR:-/Volumes/afl_data}/output
    volumes:
      - ${FWH_HANDLERS_ROOT:-$HOME/fw_handlers}/fwh_sensor_monitoring:/handlers/fwh_sensor_monitoring
      - ${AFL_DATA_DIR:-/Volumes/afl_data}:/Volumes/afl_data
    restart: unless-stopped

# Persistent volumes for MongoDB, PostGIS, and Jenkins state.
volumes:
  mongodb_data:
  postgis_data:
  jenkins_home:
